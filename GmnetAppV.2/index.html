<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="theme-color" content="#070e09">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="preload" href="fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin>
    <title>GMNET - Login Hotspot</title>
    <!-- Tailwind CSS (compiled via CLI) -->
    <link href="css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: #070e09;
        }
    </style>
</head>

<body
    class="text-white min-h-screen md:h-screen w-full md:overflow-hidden overflow-y-auto px-3 pb-3 pt-1 md:px-4 md:pb-4 md:pt-2 lg:px-5 lg:pb-5 lg:pt-3 flex flex-col antialiased">
    $(if chap-id)
    <!-- Dibuat oleh TRI SUMARYO IG: @trisumaryoo -->
    <div id="toastContainer"></div>


    <header class="w-full max-w-[1200px] mx-auto mb-4 shrink-0 relative z-50">
        <nav class="flex items-center justify-between px-6 py-4 relative border-b border-gray-700/50">
            <!-- Logo Left -->
            <a href="login.html" class="flex items-center transition-transform duration-300 hover:scale-110">
                <img src="img/logo.png" alt="GMNET Logo" class="h-20 w-auto">
            </a>

            <!-- Menu Right (Desktop) -->
            <div class="hidden md:flex items-center gap-8">
                <a href="login.html"
                    class="text-white text-xl font-medium underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Login</a>

                <a href="paket.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Paket</a>
                <a href="faq.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Faq</a>
            </div>



            <!-- Hamburger Button (Mobile) -->
            <button id="mobileMenuBtn"
                class="md:hidden text-[#1ed760] hover:text-[#169c46] focus:outline-none transition-colors duration-200">
                <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path id="hamburgerIconPath" stroke-linecap="round" stroke-linejoin="round"
                        d="M4.499 8.248h15m-15 7.5h15" />
                </svg>
            </button>

            <!-- Animated Bottom Line Container -->
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-gray-700/20 overflow-hidden">
                <div
                    class="h-full w-[35%] bg-gradient-to-r from-transparent via-[#1ed760] to-transparent animate-navbar-scan opacity-0">
                </div>
            </div>
        </nav>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu"
            class="hidden flex-col items-start gap-4 px-6 py-6 absolute top-full left-0 right-0 mt-2 bg-[#08180c]/90 backdrop-blur-xl border border-[#1ed760]/30 rounded-2xl shadow-2xl z-50 md:hidden">
            <a href="login.html"
                class="text-white text-xl font-medium underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Login</a>

            <a href="paket.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Paket</a>
            <a href="faq.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Faq</a>
        </div>
    </header>

    <main class="w-full max-w-[1200px] mx-auto flex flex-col lg:flex-row gap-4 lg:gap-8 flex-1 min-h-0">


        <!-- Right Side: Form Content -->
        <div class="flex-1 flex items-center justify-center w-full relative z-10 py-2 lg:py-10 px-5 sm:px-10">
            <div
                class="w-full max-w-[420px] bg-spot-input p-8 md:p-10 rounded-[2.5rem] border border-gray-700/40 shadow-2xl relative overflow-hidden mx-auto">

                <div class="flex justify-center gap-8 mb-8 border-b border-white/5 pb-2 relative font-poppins">
                    <button type="button" id="voucherTab"
                        class="flex items-center gap-2 text-xl md:text-2xl lg:text-3xl font-bold text-white transition-colors cursor-pointer hover:text-white font-poppins">
                        <svg class="w-5 h-5 md:w-6 md:h-6 lg:w-7 lg:h-7" fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5M.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5m15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5M4 4h1v1H4z" />
                            <path d="M7 2H2v5h5zM3 3h3v3H3zm2 8H4v1h1z" />
                            <path d="M7 9H2v5h5zM3 10h3v3H3zm8-6h1v1h-1z" />
                            <path
                                d="M9 2h5v5H9zm1 1v3h3V3zM8 8v2h1v1H8v1h2v-2h1v2h1v-1h2v-1h-3V8zm2 2H9V9h1zm4 2h-1v1h-2v1h3zm-4 2v-1H8v1z" />
                            <path d="M12 9h2V8h-2z" />
                        </svg>
                        Voucher
                    </button>

                    <button type="button" id="memberTab"
                        class="flex items-center gap-2 text-xl md:text-2xl lg:text-3xl font-bold text-gray-400 transition-colors cursor-pointer hover:text-white font-poppins">
                        <svg class="w-5 h-5 md:w-6 md:h-6 lg:w-7 lg:h-7" fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M1.5 1a.5.5 0 0 0-.5.5v3a.5.5 0 0 1-1 0v-3A1.5 1.5 0 0 1 1.5 0h3a.5.5 0 0 1 0 1zM11 .5a.5.5 0 0 1 .5-.5h3A1.5 1.5 0 0 1 16 1.5v3a.5.5 0 0 1-1 0v-3a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 1-.5-.5M.5 11a.5.5 0 0 1 .5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 1 0 1h-3A1.5 1.5 0 0 1 0 14.5v-3a.5.5 0 0 1 .5-.5m15 0a.5.5 0 0 1 .5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3a.5.5 0 0 1 0-1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 1 .5-.5" />
                            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                        </svg>
                        Member
                    </button>

                    <div id="tabIndicator" class="tab-indicator"></div>
                </div>


                <!-- UI Container (Not submitted directly) -->
                <div id="loginUI" class="space-y-4">

                    <!-- Member Fields Group -->
                    <div id="memberFields" class="hidden space-y-4">
                        <!-- Username -->
                        <div class="space-y-1.5">
                            <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan
                                Username</label>
                            <input type="text" id="ui_username" placeholder="Username" value="$(username)"
                                class="w-full px-4 py-3 bg-spot-input border border-white/5 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                        </div>

                        <!-- Password -->
                        <div class="space-y-1.5">
                            <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan
                                Password</label>
                            <div class="relative">
                                <input type="password" id="passwordInput" placeholder="Password"
                                    class="w-full pl-4 pr-12 py-3 bg-spot-input border border-white/5 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                                <button type="button" id="togglePasswordBtn"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                        <path id="eyeIconPath"
                                            d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.93 2.93c1.51-1.29 2.7-2.9 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.73 10.03 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Voucher Fields Group -->
                    <div id="voucherFields" class="space-y-1.5 pb-6">
                        <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan kode voucher
                            anda</label>
                        <input type="text" id="ui_voucher" placeholder="Masukan kode voucher" value="$(username)"
                            class="w-full px-4 py-3 bg-spot-input border border-white/5 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                    </div>

                    <!-- Login Button -->
                    <button type="button" id="loginBtn" onclick="doLogin()"
                        class="w-full bg-spot-green hover:bg-spot-green-hover text-white font-bold text-[1.1rem] py-3.5 rounded-lg transition-transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3">
                        <span>LOGIN</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="w-6 h-6 bi bi-arrow-right-square-fill" viewBox="0 0 16 16">
                            <path
                                d="M0 14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v12zm4.5-6.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5a.5.5 0 0 1 0-1z" />
                        </svg>
                    </button>

                    <!-- Mikrotik Error Message -->
                    $(if error)
                    <div id="mikrotikError"
                        class="flex items-start justify-between gap-3 p-4 mt-4 rounded-2xl animate-toast-in">
                        <div class="flex items-start gap-3 text-red-100">
                            <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2" />
                            </svg>
                            <span class="text-sm font-semibold tracking-tight leading-relaxed">$(error)</span>
                        </div>
                        <button type="button" onclick="document.getElementById('mikrotikError').style.display='none'"
                            class="text-red-400 hover:text-white transition-colors shrink-0">
                            <svg class="w-4 h-4 mt-0.5" fill="currentColor" viewBox="0 0 16 16">
                                <path
                                    d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z" />
                            </svg>
                        </button>
                    </div>
                    $(endif)

                </div>

                <!-- HIDDEN SUBMISSION FORM (REAL) -->
                <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
                    <input type="hidden" name="username" />
                    <input type="hidden" name="password" />
                    <input type="hidden" name="dst" value="$(link-status)" />
                    <input type="hidden" name="popup" value="true" />
                    <input type="hidden" name="chap-id" value="$(chap-id)" />
                    <input type="hidden" name="chap-challenge" value="$(chap-challenge)" />
                    <input type="hidden" name="link-login" value="$(link-login)" />
                    <input type="hidden" name="link-orig" value="$(link-orig)" />
                    <input type="hidden" name="error-orig" value="$(error-orig)" />
                </form>



                <!-- Copyright -->
                <div class="text-center text-xs mt-4 text-gray-500 font-light">
                    © 2026 GMNET. All Rights Reserved
                </div>

            </div>
        </div>

    </main>
    <script src="js/script.js"></script>
    <script src="/md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }

    </script>
    $(endif)
</body>

</html>
