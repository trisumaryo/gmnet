<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#070e09">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="preload" href="fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin>
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <title>Suksess - GMNET</title>
    <!-- Tailwind CSS (compiled via CLI) -->
    <link href="css/style.css" rel="stylesheet">
    <script>
        function start() {
            // Standard Mikrotik popup status window logic
            if ('$(popup)' == 'true') {
                window.open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
            }
        }
    </script>
</head>

<body
    class="text-white min-h-screen md:h-screen w-full md:overflow-hidden overflow-y-auto px-3 pb-3 pt-1 md:px-4 md:pb-4 md:pt-2 lg:px-5 lg:pb-5 lg:pt-3 flex flex-col antialiased"
    onload="start()">

    <header class="w-full max-w-[1200px] mx-auto mb-4 shrink-0 relative z-50">
        <nav class="flex items-center justify-between px-6 py-4 relative border-b border-gray-700/50">
            <!-- Logo Left -->
            <a href="login.html" class="flex items-center transition-transform duration-300 hover:scale-110">
                <img src="img/logo.png" alt="GMNET Logo" class="h-20 w-auto">
            </a>

            <!-- Menu Right (Desktop) -->
            <div class="hidden md:flex items-center gap-8">
                <a href="login.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Login</a>
                <a href="paket.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Paket</a>
                <a href="faq.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Faq</a>
            </div>



            <!-- Hamburger Button (Mobile) -->
            <button id="mobileMenuBtn"
                class="md:hidden text-[#1ed760] hover:text-[#169c46] focus:outline-none transition-colors duration-200">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 16 16">
                    <path id="hamburgerIconPath" fill-rule="evenodd"
                        d="M2.5 10a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" />
                </svg>
            </button>

            <!-- Animated Bottom Line Container -->
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-gray-700/20 overflow-hidden">
                <div
                    class="h-full w-[35%] bg-gradient-to-r from-transparent via-[#1ed760] to-transparent animate-navbar-scan opacity-0">
                </div>
            </div>
        </nav>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu"
            class="hidden flex-col items-start gap-4 px-6 py-6 absolute top-full left-0 right-0 mt-2 bg-[#08180c]/90 backdrop-blur-xl border border-[#1ed760]/30 rounded-2xl shadow-2xl z-50 md:hidden">
            <a href="login.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Login</a>
            <a href="paket.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Paket</a>
            <a href="faq.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Faq</a>
        </div>
    </header>

    <main class="w-full max-w-[1200px] mx-auto flex-1 flex items-start justify-center p-4 pt-1 min-h-0">

        <div
            class="w-full max-w-[650px] bg-spot-input p-8 md:p-10 rounded-[2.5rem] border border-gray-700/40 shadow-2xl relative overflow-hidden text-center">
            <!-- Glow Accent -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#1ed760]/10 blur-[80px] rounded-full"></div>

            <div class="relative z-10">
                <!-- Success Icon -->
                <div
                    class="w-20 h-20 bg-[#1ed760]/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-[#1ed760]/20 text-[#1ed760]">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 16 16">
                        <path
                            d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l2.352 2.525 4.903-5.592a.267.267 0 0 1 .217-.287z" />
                    </svg>
                </div>

                <h1 class="text-3xl font-black mb-4 tracking-tight">Selamat Datang!</h1>
                <p class="text-gray-400 mb-8 font-medium">Otentikasi berhasil. Anda sekarang terhubung ke jaringan
                    GMNET.</p>

                <!-- Action Button -->
                <div class="space-y-3">
                    <a href="$(link-redirect)"
                        class="flex w-full bg-[#1ed760] hover:bg-[#169c46] text-black font-bold py-3.5 rounded-xl transition-all transform active:scale-95 items-center justify-center gap-2">

                        LANJUTKAN KE INTERNET
                    </a>
                </div>

                <div class="mt-8 text-[10px] text-gray-600 font-medium tracking-widest uppercase md:hidden">
                    © 2026 GMNET. All Rights Reserved
                </div>
            </div>
        </div>

    </main>

    <script src="js/script.js"></script>
</body>

</html>
