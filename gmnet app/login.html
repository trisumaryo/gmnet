<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <title>GMNET - Login Hotspot</title>
    <!-- Tailwind CSS (compiled via CLI) -->
    <link href="style.css" rel="stylesheet">
</head>

<body class="text-white min-h-screen md:h-screen w-full md:overflow-hidden overflow-y-auto px-3 pb-3 pt-1 md:px-4 md:pb-4 md:pt-2 lg:px-5 lg:pb-5 lg:pt-3 flex flex-col antialiased">
    <!-- Custom Toast Container -->
    <div id="toastContainer"></div>


    <header class="w-full max-w-[1200px] mx-auto mb-8 shrink-0 relative z-50">
        <nav class="flex items-center justify-between px-6 py-4 relative border-b border-gray-700/50">
            <!-- Logo Left -->
            <a href="login.html" class="flex items-center transition-transform duration-300 hover:scale-110">
                <img src="img/logo gmnet.svg" alt="GMNET Logo" class="h-20 w-auto">
            </a>

            <!-- Menu Right (Desktop) -->
            <div class="hidden md:flex items-center gap-8">
                <a href="login.html"
                    class="text-white text-xl font-medium underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Login</a>

                <a href="paket.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Paket</a>
                <a href="faq.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Faq</a>
            </div>



            <!-- Hamburger Button (Mobile) -->
            <button id="mobileMenuBtn"
                class="md:hidden text-white hover:text-[#1ed760] focus:outline-none transition-colors duration-200">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 16 16">
                    <path id="hamburgerIconPath"
                        d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3" />
                </svg>
            </button>

            <!-- Animated Bottom Line Container -->
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-gray-700/20 overflow-hidden">
                <div class="h-full w-[35%] bg-gradient-to-r from-transparent via-[#1ed760] to-transparent animate-navbar-scan opacity-0"></div>
            </div>
        </nav>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu"
            class="hidden flex-col items-start gap-4 px-6 py-6 absolute top-full left-0 right-0 mt-2 bg-[#08180c]/90 backdrop-blur-xl border border-[#1ed760]/30 rounded-2xl shadow-2xl z-50 md:hidden">
            <a href="login.html"
                class="text-white text-xl font-medium underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Login</a>

            <a href="paket.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Paket</a>
            <a href="faq.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Faq</a>
        </div>
    </header>

    <main class="w-full max-w-[1200px] mx-auto flex flex-col lg:flex-row gap-4 lg:gap-8 flex-1 min-h-0">

        <!-- Left Side: Image Banner -->
        <div
            class="hidden lg:flex w-full lg:w-5/12 xl:w-1/2 flex-col justify-between relative rounded-[2rem] shadow-2xl p-8 xl:p-12 bg-gradient-to-b from-white from-30% via-[#1ed760] via-75% to-[#1ed760] overflow-hidden h-full">

            <!-- Duotone Image Trick: Black and white image blended with green bg -->
            <img src="img/content3.svg" alt="Woman listening to music"
                class="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-80 pointer-events-none" />

            <!-- Subtle gradient overlay to ensure text contrast -->
            <div
                class="absolute inset-0 bg-gradient-to-t from-[#1ed760]/90 via-transparent to-[#1ed760]/10 pointer-events-none mix-blend-normal">
            </div>

            <!-- Top Left: Logo -->
            <div class="relative z-10 flex items-center gap-1 text-black">
                <svg viewBox="0 0 24 24" fill="none" stroke="#1ed760" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-11 h-11 shrink-0">
                    <line x1="4" y1="9" x2="20" y2="9"></line>
                    <line x1="4" y1="15" x2="20" y2="15"></line>
                    <line x1="10" y1="3" x2="8" y2="21"></line>
                    <line x1="16" y1="3" x2="14" y2="21"></line>
                </svg>
                <span class="text-[1.75rem] font-bold tracking-tight">WifiHemat</span>
            </div>

            <!-- Bottom Left: Text -->
            <div class="relative z-10 text-black pr-8 pb-4">
                <h1 class="text-[3.2rem] xl:text-[3.8rem] font-extrabold mb-3 leading-[1.05] tracking-tight">
                    Nikamati Internet<br>Sepuasnya
                </h1>
                <p class="text-xl font-medium opacity-90 tracking-wide mt-4">
                    Hemat biayanya, maksimal koneksinya!
                </p>
            </div>
        </div>

        <!-- Right Side: Form Content -->
        <div class="flex-1 flex items-center justify-center w-full relative z-10 pt-20 pb-10 lg:py-10 px-5 sm:px-10">
            <div class="w-full max-w-[420px]">

                <div class="flex gap-8 mb-8 border-b border-gray-700/60 pb-2 relative font-poppins">
                    <button type="button" id="memberTab"
                        class="text-2xl lg:text-3xl font-bold text-gray-400 transition-colors cursor-pointer hover:text-white font-poppins">
                        Member
                    </button>

                    <button type="button" id="voucherTab"
                        class="text-2xl lg:text-3xl font-bold text-white transition-colors cursor-pointer hover:text-white font-poppins">
                        Voucher
                    </button>

                    <div id="tabIndicator" class="tab-indicator"></div>
                </div>


                <form name="sendin" action="$(link-login-only)" method="post" onsubmit="return doLogin()" class="space-y-4">
                    <input type="hidden" name="dst" value="$(link-orig)" />
                    <input type="hidden" name="popup" value="true" />
                    <input type="hidden" name="chap-id" value="$(chap-id)" />
                    <input type="hidden" name="chap-challenge" value="$(chap-challenge)" />
                    <input type="hidden" name="link-login" value="$(link-login)" />
                    <input type="hidden" name="link-orig" value="$(link-orig)" />
                    <input type="hidden" name="error-orig" value="$(error-orig)" />

                    <!-- Member Fields Group -->
                    <div id="memberFields" class="hidden space-y-4">

                        <!-- Username -->
                        <div class="space-y-1.5">
                            <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan Username</label>
                            <input type="text" name="username" placeholder="Username" value="$(username)"
                                class="w-full px-4 py-3 bg-spot-input border border-gray-700/60 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                        </div>

                        <!-- Password -->
                        <div class="space-y-1.5">
                            <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan Password</label>

                            <div class="relative">
                                <input type="password" id="passwordInput" name="password" placeholder="Password"
                                    class="w-full pl-4 pr-12 py-3 bg-spot-input border border-gray-700/60 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                                <button type="button" id="togglePasswordBtn"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                        <path id="eyeIconPath"
                                            d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.93 2.93c1.51-1.29 2.7-2.9 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.73 10.03 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                                    </svg>

                                </button>
                            </div>
                        </div>


                    </div>

                    <!-- Voucher Fields Group -->
                    <div id="voucherFields" class="space-y-1.5 pb-6">
                        <label class="block text-[0.9rem] font-normal text-gray-200 font-poppins">Masukan kode voucher anda</label>
                        <input type="text" name="username_voucher" placeholder="Masukan kode voucher"
                            class="w-full px-4 py-3 bg-spot-input border border-gray-700/60 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1ed760] focus:border-transparent transition-all" />
                    </div>


                    <!-- Login Button -->
                    <button type="submit"
                        class="w-full bg-spot-green hover:bg-spot-green-hover text-white font-bold text-[1.1rem] py-3.5 rounded-lg transition-transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3">
                        <span>Login</span>

                        <svg class="w-6 h-6" fill="currentColor" stroke="currentColor" stroke-width="1"
                            viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8" />
                        </svg>
                    </button>

                    <!-- Mikrotik Error Message -->
                    $(if error)
                    <div id="mikrotikError" class="flex items-start justify-between gap-3 p-4 mt-4 rounded-2xl animate-toast-in">
                        <div class="flex items-start gap-3 text-red-100">
                            <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>
                            </svg>
                            <span class="text-sm font-semibold tracking-tight leading-relaxed">$(error)</span>
                        </div>
                        <button type="button" onclick="document.getElementById('mikrotikError').style.display='none'" class="text-red-400 hover:text-white transition-colors shrink-0">
                            <svg class="w-4 h-4 mt-0.5" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
                            </svg>
                        </button>
                    </div>
                    $(endif)

                </form>



                <!-- Copyright -->
                <div class="text-center text-xs mt-4 text-gray-500 font-light">
                    © 2026 GMNET. All Rights Reserved
                </div>

            </div>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
