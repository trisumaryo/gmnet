<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <meta http-equiv="refresh" content="2; url=$(adv-link)">
    <title>Informasi - GMNET</title>
    <!-- Tailwind CSS (compiled via CLI) -->
    <link href="style.css" rel="stylesheet">
</head>

<body class="text-white min-h-screen md:h-screen w-full md:overflow-hidden overflow-y-auto px-3 pb-3 pt-1 md:px-4 md:pb-4 md:pt-2 lg:px-5 lg:pb-5 lg:pt-3 flex flex-col antialiased">

    <header class="w-full max-w-[1200px] mx-auto mb-4 shrink-0 relative z-50">
        <nav class="flex items-center justify-between px-6 py-4 relative border-b border-gray-700/50">
            <!-- Logo Left -->
            <a href="login.html" class="flex items-center transition-transform duration-300 hover:scale-110">
                <img src="img/logo gmnet.svg" alt="GMNET Logo" class="h-20 w-auto">
            </a>

            <!-- Menu Right (Desktop) -->
            <div class="hidden md:flex items-center gap-8">
                <a href="login.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Login</a>
                <a href="paket.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Paket</a>
                <a href="faq.html"
                    class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-all duration-200">Faq</a>
            </div>

            <!-- Hamburger Button (Mobile) -->
            <button id="mobileMenuBtn"
                class="md:hidden text-white hover:text-[#1ed760] focus:outline-none transition-colors duration-200">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 16 16">
                    <path id="hamburgerIconPath"
                        d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3" />
                </svg>
            </button>

            <!-- Animated Bottom Line Container -->
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-gray-700/20 overflow-hidden">
                <div class="h-full w-[35%] bg-gradient-to-r from-transparent via-[#1ed760] to-transparent animate-navbar-scan opacity-0"></div>
            </div>
        </nav>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu"
            class="hidden flex-col items-start gap-4 px-6 py-6 absolute top-full left-0 right-0 mt-2 bg-[#08180c]/90 backdrop-blur-xl border border-[#1ed760]/30 rounded-2xl shadow-2xl z-50 md:hidden">
            <a href="login.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Login</a>
            <a href="paket.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Paket</a>
            <a href="faq.html"
                class="text-white text-xl font-medium hover:underline decoration-[#1ed760] decoration-2 underline-offset-8 transition-colors">Faq</a>
        </div>
    </header>

    <main class="w-full max-w-[1200px] mx-auto flex-1 flex items-start justify-center p-4 pt-1 min-h-0">
        
        <div class="w-full max-w-[650px] bg-spot-input p-8 md:p-10 rounded-[2.5rem] border border-gray-700/40 shadow-2xl relative overflow-hidden text-center">
            <!-- Glow Accent -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#1ed760]/10 blur-[80px] rounded-full"></div>
            
            <div class="relative z-10">
                <!-- Ad Icon -->
                <div class="w-20 h-20 bg-[#1ed760]/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-[#1ed760]/20 text-[#1ed760]">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M12.356 3.066a.5.5 0 0 0-.712.006l-7.11 7.11a.5.5 0 0 0 .707.707l7.11-7.11a.5.5 0 0 0-.006-.713z"/>
                        <path d="M14.002 2a2 2 0 0 0-2-2h-10a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V2zM1 2a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2z"/>
                    </svg>
                </div>

                <h1 class="text-3xl font-black mb-4 tracking-tight">Satu Langkah Lagi</h1>
                <p class="text-gray-400 mb-8 font-medium italic">Menampilkan informasi iklan...</p>

                <!-- Action Button -->
                <div class="space-y-3">
                    <a href="$(adv-link)" 
                        class="flex w-full bg-[#1ed760] hover:bg-[#1fdf64] text-black font-bold py-3.5 rounded-xl transition-all transform active:scale-95 items-center justify-center gap-2">
                        LANJUTKAN
                    </a>
                </div>

                <div class="mt-8 text-[10px] text-gray-600 font-medium tracking-widest uppercase md:hidden">
                    © 2026 GMNET. All Rights Reserved
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
