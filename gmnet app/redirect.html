<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <title>GMN - Redirecting</title>
    <!-- Tailwind CSS (compiled via CLI) -->
    <link href="style.css" rel="stylesheet">
</head>

<body class="bg-spot-bg text-white min-h-screen flex items-center justify-center p-6 antialiased">

    <div class="w-full max-w-[420px] bg-spot-input p-10 rounded-[2.5rem] border border-gray-700/40 shadow-2xl relative overflow-hidden text-center">
        <!-- Glow Accent -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#1ed760]/10 blur-[80px] rounded-full"></div>
        
        <div class="relative z-10">
            <!-- Loading Spinner -->
            <div class="mb-6 flex justify-center">
                <div class="w-12 h-12 border-4 border-gray-700 border-t-[#1ed760] rounded-full animate-spin"></div>
            </div>

            <h1 class="text-2xl font-black mb-2">Mengarahkan...</h1>
            <p class="text-gray-400 mb-8 text-sm">Harap tunggu sebentar, kami sedang menghubungkan Anda ke tujuan.</p>

            <a href="$(link-redirect)" class="text-[#1ed760] text-sm font-bold hover:underline underline-offset-4 decoration-2">
                Klik disini jika tidak diarahkan secara otomatis
            </a>
        </div>
    </div>

</body>

</html>
